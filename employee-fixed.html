<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 4px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; }
        .error { color: red; }
    </style>
</head>
<body>
<div class="container">
    <h2>Employee Login</h2>
    <form id="loginForm">
        <div class="error" id="error-message" style="display: none;"></div>
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>
</div>
<script>
    document.getElementById('loginForm').onsubmit = function(event) {
        event.preventDefault(); // Prevent default form submission
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorMessage = document.getElementById('error-message');
        errorMessage.style.display = 'none'; // Reset error message visibility

        // Simple validation for demonstration
        if (username === '' || password === '') {
            errorMessage.innerText = 'Username and password are required.';
            errorMessage.style.display = 'block';
            return;
        }

        // Dummy authentication check (replace with real checks)
        if (username === 'admin' && password === 'password') {
            alert('Login successful!');
            // Redirect to employee dashboard or main portal
        } else {
            errorMessage.innerText = 'Invalid credentials. Please try again.';
            errorMessage.style.display = 'block';
        }
    };
</script>
</body>
</html>
